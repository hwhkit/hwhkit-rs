# cargo-deny configuration for the hwhkit workspace.
#
# We rely on three checks: licenses (allowlist of permissive OSI-approved
# licenses), advisories (deny everything in the RustSec database by
# default), and bans (no duplicate dependency versions for our own
# crates). See https://embarkstudios.github.io/cargo-deny/ for the full
# schema.

[graph]
all-features = true

[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
# Permissive licenses we're happy to depend on.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "0BSD",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Allow many versions of these — they're in widespread upstream use and
# pinning a single version is impractical.
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
